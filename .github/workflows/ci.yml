name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          check-latest: true

      - name: gofmt
        shell: bash
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt found unformatted files:"
            echo "$out"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test (race)
        run: go test -race ./...

      - name: go build
        run: go build -buildvcs=false ./cmd/beagle

      - name: beagle selftest
        run: |
          go build -buildvcs=false -o ./beagle ./cmd/beagle
          ./beagle selftest

      # go.work is gitignored (local dev only) and must not exist while
      # the core module steps above run, so the core resolves exactly as
      # it does without the nested module. Created here so the osquery
      # steps below can see the core module through the workspace even
      # though the nested go.mod has no `require`/`replace` on it.
      - name: create go.work (osquery workspace)
        run: go work init . ./osquery

      - name: gofmt (osquery)
        shell: bash
        run: |
          out=$(gofmt -l ./osquery)
          if [ -n "$out" ]; then
            echo "gofmt found unformatted files:"
            echo "$out"
            exit 1
          fi

      - name: go vet (osquery)
        working-directory: osquery
        run: go vet ./...

      - name: go test (osquery, race)
        working-directory: osquery
        run: go test -race ./...

      - name: go build (osquery)
        working-directory: osquery
        run: go build -buildvcs=false .

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26"
          check-latest: true

      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0

      - name: govulncheck
        run: govulncheck ./...
