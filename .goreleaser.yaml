version: 2

project_name: beagle

before:
  hooks:
    - go mod tidy

builds:
  - id: beagle
    main: ./cmd/beagle
    binary: beagle
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.Version={{.Tag}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

  # The osquery extension lives in a nested Go module (osquery/), kept
  # separate so osquery-go/Thrift stay out of the core. `dir` runs the
  # build there; the .ext suffix is mandatory for osquery autoload. It
  # imports the core's internal/ packages, so the build needs the
  # go.work overlay in scope (created by CI / present in local dev) —
  # do NOT set GOWORK=off here.
  - id: beagle-osquery
    main: .
    dir: osquery
    binary: beagle.ext
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.Version={{.Tag}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - id: beagle
    ids:
      - beagle
    formats:
      - tar.gz
    name_template: >-
      beagle_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - NOTICE
      - README.md
      - threat_intel/**

  - id: beagle-osquery
    ids:
      - beagle-osquery
    formats:
      - tar.gz
    name_template: >-
      beagle-osquery_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - NOTICE
      - src: osquery/README.md
        dst: README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

release:
  draft: true
  prerelease: auto

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"
      - "^test:"
